spring:
  application:
    name: gateway-service
  datasource:
    url: jdbc:mysql://localhost:3306/flowboard_gateway?createDatabaseIfNotExist=true
    username: root
    password: 05092006
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/admin/**, /oauth2/**, /login/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
        - id: workspace-service
          uri: lb://workspace-service
          predicates:
            - Path=/api/v1/workspaces/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
        - id: board-service
          uri: lb://board-service
          predicates:
            - Path=/api/v1/boards/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
        - id: list-service
          uri: lb://list-service
          predicates:
            - Path=/api/v1/lists/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
        - id: card-service
          uri: lb://card-service
          predicates:
            - Path=/api/v1/cards/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/api/v1/comments/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
        - id: label-service
          uri: lb://board-service
          predicates:
            - Path=/api/v1/labels/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/${segment}

server:
  port: 8080

eureka:
  instance:
    hostname: localhost
    ip-address: 127.0.0.1
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true