spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Auth Service → port 8081
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        # Workspace Service → port 8082
        - id: workspace-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/workspaces/**

        # Board Service → port 8083
        - id: board-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/boards/**

        # List Service → port 8084
        - id: list-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/lists/**

        # Card Service → port 8085
        - id: card-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/cards/**

        # Comment Service → port 8086
        - id: comment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/comments/**

        # Label Service → port 8087
        - id: label-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/labels/**

        # Notification Service → port 8088
        - id: notification-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/notifications/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

server:
  port: 8080

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

logging:
  level:
    org.springframework.cloud.gateway: DEBUG