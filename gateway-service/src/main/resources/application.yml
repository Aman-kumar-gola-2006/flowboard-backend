spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: eureka-dashboard
          uri: http://localhost:8761
          predicates:
            - Path=/eureka/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true