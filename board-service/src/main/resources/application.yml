spring:
  application:
    name: board-service
  datasource:
    # Make sure MySQL is running buddy
    url: jdbc:mysql://localhost:3306/flowboard_board?createDatabaseIfNotExist=true
    username: root
    password: 05092006
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8083

# Eureka config
eureka:
  instance:
    hostname: localhost
    ip-address: 127.0.0.1
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

workspace:
  service:
    url: http://workspace-service/api/workspaces
