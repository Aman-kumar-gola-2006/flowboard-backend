spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3306/flowboard_auth?createDatabaseIfNotExist=true
    username: root
    password: 05092006
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
