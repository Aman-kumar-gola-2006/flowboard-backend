spring:
  application:
    name: card-service
  datasource:
    url: jdbc:mysql://localhost:3306/flowboard_card?createDatabaseIfNotExist=true
    username: root
    password: 05092006
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8085

eureka:
  instance:
    hostname: localhost
    ip-address: 127.0.0.1
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

list:
  service:
    url: http://list-service/api/lists
