# List Service Config
# Aman - 18 April 2026

spring:
  application:
    name: list-service
  datasource:
    url: jdbc:mysql://localhost:3306/flowboard_list?createDatabaseIfNotExist=true
    username: admin
    password: 05092006
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8084

eureka:
  instance:
    hostname: localhost
    ip-address: 127.0.0.1
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

# Board service URL for Feign client
board:
  service:
    url: http://board-service/api/boards
